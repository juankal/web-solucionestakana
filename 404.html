<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada | Soluciones Takana</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="/images/logo-takana.png">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #020617;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            text-align: center;
            padding: 2rem;
        }
        .container {
            max-width: 480px;
        }
        .error-code {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 8rem;
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(to right, #22d3ee, #818cf8);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #fff;
        }
        p {
            color: #94a3b8;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 2rem;
            background: linear-gradient(to right, #0891b2, #2563eb);
            color: #fff;
            font-weight: 700;
            font-size: 0.9375rem;
            border-radius: 9999px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(6, 182, 212, 0.6);
        }
        .logo {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            margin: 0 auto 2rem;
            border: 1px solid #334155;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="/images/logo-takana.png" alt="Logo Soluciones Takana" class="logo"
            onerror="this.style.display='none'">
        <div class="error-code">404</div>
        <h1>Página no encontrada</h1>
        <p>La página que buscas no existe o fue movida. Regresa al inicio para encontrar lo que necesitas.</p>
        <a href="/" class="btn">← Volver al inicio</a>
    </div>
</body>
</html>
